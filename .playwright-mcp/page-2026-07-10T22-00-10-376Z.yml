    - generic [ref=f6e84]:
      - generic [ref=f6e85]: Our Philosophy
      - heading "Care that moves at the pace of nature" [level=2] [ref=f6e86]
      - paragraph [ref=f6e87]: We don’t believe in assembly-line medicine. Every person who walks through our doors begins a journey that unfolds at its own rhythm — examined, understood, and guided by a team that sees the whole picture.
    - generic [ref=f6e88]:
      - article [ref=f6e89]:
        - generic [ref=f6e90]: growing
        - heading "Rooted" [level=3] [ref=f6e92]
        - paragraph [ref=f6e93]: Deep expertise, earned over years. Our specialists bring rigorous training and quiet confidence to every consultation — care built on a foundation you can trust.
      - article [ref=f6e94]:
        - generic [ref=f6e95]: water
        - heading "Flowing" [level=3] [ref=f6e97]
        - paragraph [ref=f6e98]: No rigid protocols. Treatment bends to your life, your schedule, your comfort. We listen first, then design a path that moves with you — not against you.
      - article [ref=f6e99]:
        - generic [ref=f6e100]: shift
        - heading "Rising" [level=3] [ref=f6e102]
        - paragraph [ref=f6e103]: Health isn’t just the absence of illness — it’s the energy to live fully. We aim for outcomes that restore not just function, but the joy of feeling well.
